name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight (typecheck + test + build)
        run: pnpm preflight

      - name: Build site artifact
        run: pnpm build:site

      - name: Build single-file artifact
        run: pnpm build:single

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-site
          path: dist-site/
          retention-days: 14

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-single
          path: dist-single/
          retention-days: 14
