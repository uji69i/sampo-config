name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run instead of publishing'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  publish:
    name: publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing sampo-config@$PKG_VERSION"

      - name: Preflight (typecheck + test + build)
        run: pnpm preflight

      - name: Build site + single-file artifacts
        run: |
          pnpm build:site
          pnpm build:single

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish
        if: github.event.inputs.dry_run == 'true'
        run: pnpm publish --dry-run --no-git-checks --access public

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: sampo-config ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-single/index.html
