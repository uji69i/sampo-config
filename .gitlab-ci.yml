# GitLab CI mirror of .github/workflows/.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   NPM_TOKEN — npm automation token. Mark it protected + masked.

default:
  image: node:20
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

stages:
  - test
  - build
  - pages
  - publish

.pnpm_setup: &pnpm_setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

test:
  stage: test
  <<: *pnpm_setup
  script:
    - pnpm preflight
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build:artifacts:
  stage: build
  <<: *pnpm_setup
  script:
    - pnpm build:site
    - pnpm build:single
  artifacts:
    paths:
      - dist-site/
      - dist-single/
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

pages:
  stage: pages
  <<: *pnpm_setup
  script:
    - pnpm build:site
    - rm -rf public
    - mv dist-site public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

publish:npm:
  stage: publish
  <<: *pnpm_setup
  script:
    - |
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      PKG_VERSION=$(node -p "require('./package.json').version")
      if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
        echo "Tag $CI_COMMIT_TAG does not match package.json version $PKG_VERSION"
        exit 1
      fi
    - pnpm preflight
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - pnpm publish --no-git-checks --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
